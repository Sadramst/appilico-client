<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C7D2FE"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <!-- Stylized "A" letterform with shopping bag handle -->
  <!-- Shopping bag body (the A shape) -->
  <path d="M160 400 L256 112 L352 400 L320 400 L296 320 L216 320 L192 400 Z" fill="white" opacity="0.95"/>
  <!-- Inner triangle cutout -->
  <path d="M232 288 L256 208 L280 288 Z" fill="url(#bg-grad)"/>
  <!-- Bag handles (arch on top) -->
  <path d="M208 180 Q 208 100, 256 100 Q 304 100, 304 180" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Small sparkle/star accent -->
  <circle cx="370" cy="140" r="6" fill="url(#accent)"/>
  <circle cx="386" cy="124" r="4" fill="url(#accent)" opacity="0.7"/>
  <circle cx="354" cy="128" r="3" fill="url(#accent)" opacity="0.5"/>
</svg>
