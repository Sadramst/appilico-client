<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none">
  <defs>
    <linearGradient id="teal-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Stylized "A" letterform - white/light gray -->
  <!-- Left leg -->
  <path d="M175 470 L282 95 L318 95 L215 470 Z" fill="#f0f0f0"/>
  <!-- Right leg -->
  <path d="M385 470 L282 95 L318 95 L425 470 Z" fill="#e8e8e8"/>
  <!-- Crossbar -->
  <path d="M228 340 L372 340 L362 370 L238 370 Z" fill="#f0f0f0"/>

  <!-- Teal arc/brace on upper right -->
  <path d="M318 95 C 410 95, 460 155, 460 225 C 460 280, 435 315, 400 340 L410 340 C 450 310, 480 265, 480 225 C 480 140, 420 75, 318 80 Z" fill="url(#teal-grad)" opacity="0.9"/>

  <!-- Circuit lines on the left (3 horizontal lines with dots) -->
  <line x1="100" y1="200" x2="175" y2="200" stroke="#34d399" stroke-width="3"/>
  <circle cx="100" cy="200" r="5" fill="#34d399"/>
  <line x1="110" y1="230" x2="185" y2="230" stroke="#34d399" stroke-width="3"/>
  <circle cx="110" cy="230" r="5" fill="#34d399"/>
  <line x1="120" y1="260" x2="195" y2="260" stroke="#34d399" stroke-width="3"/>
  <circle cx="120" cy="260" r="5" fill="#34d399"/>
  <!-- Vertical connecting line for circuits -->
  <line x1="175" y1="200" x2="195" y2="260" stroke="#34d399" stroke-width="2.5"/>

  <!-- Tower/needle silhouette in center of A -->
  <rect x="296" y="200" width="8" height="140" rx="2" fill="#d0d0d0" opacity="0.6"/>
  <path d="M300 200 L290 245 L310 245 Z" fill="#d0d0d0" opacity="0.5"/>
  <circle cx="300" cy="195" r="4" fill="#d0d0d0" opacity="0.6"/>
  <!-- Tower observation deck -->
  <ellipse cx="300" cy="250" rx="14" ry="4" fill="#d0d0d0" opacity="0.45"/>

  <!-- Small sparkle accent -->
  <path d="M300 280 L302 274 L304 280 L310 282 L304 284 L302 290 L300 284 L294 282 Z" fill="#34d399" opacity="0.7"/>

  <!-- APPILICO wordmark -->
  <text x="300" y="545" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="52" font-weight="500" letter-spacing="14" fill="#f0f0f0">APPILICO</text>
</svg>
